[mypy]

strict = True

# Explicitation de certaines options clés incluses dans `strict = True`
# pour mettre l'accent sur leur rôle pour les attributs :

# 1. Force l'annotation des méthodes, y compris __init__
# Si __init__ n'est pas typée, Mypy peut ignorer des erreurs dans son corps.
disallow_untyped_defs = True

# 2. Vérifie le corps des méthodes même si leur signature n'est pas parfaite.
# Cela permet à Mypy de détecter des problèmes avec les attributs d'instance
# définis à l'intérieur de ces méthodes.
check_untyped_defs = True

# 3. Gère `None` de manière très stricte.
# C'est FONDAMENTAL pour détecter `self.a = None` sans annotation.
# Si un attribut est initialisé à None et n'est pas Optional[T], Mypy lèvera une erreur
# lorsque cet attribut est utilisé d'une manière incompatible avec None.
strict_optional = True

# 4. Empêche l'utilisation ou l'inférence implicite de 'Any'.
# Si Mypy ne peut pas inférer un type précis pour un attribut d'instance
# et qu'il devrait devenir 'Any', cette option générera une erreur.
disallow_any_expr = True
disallow_any_unimported = True
disallow_any_generics = True
disallow_any_explicit = True

# Autres options de strictesse recommandées
warn_redundant_casts = True
warn_unused_ignores = True
warn_return_any = True





show_error_codes = true
pretty = true
