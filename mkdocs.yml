site_name: pyKMC
theme:
  name: material
  font:
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-orange
      accent: red
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep-orange
      accent: red
      toggle:
        icon: material/brightness-3
        name: Switch to light mode

  features:
  - content.code.copy
  - content.code.annotate
  - content.code.highlight
  - content.tabs.link

nav:
  - Home: index.md
  - User Guide:
      - Overview: user_guide/index.md
      - Installation:
          - Install pyKMC: user_guide/install/installation.md
          - macOS Compile Instructions: user_guide/install/pykmc_mac_Compile_Instructions.md
          - Linux Compile Instructions: user_guide/install/pykmc_linux_Compile_Instructions.md
      - Parallelization: user_guide/parallelization.md
      - Basins: user_guide/basins.md
      - Active Volumes: user_guide/active_volumes.md
      - Symmetries: user_guide/symmetries.md
      - KMC Parameters: parameters.md
  - Theory & Concepts:
      - Algorithm Overview: theory/general_algorithm.md
      - Transition State Theory: theory/tst.md
      - Kinetic Monte Carlo: theory/kmc.md
  - Troubleshooting: troubleshooting.md
  - Developer Guide:
      - Overview: developer_guide/index.md
      - Architecture: developer_guide/architecture.md
      - MPI & Parallel Execution: developer_guide/mpi.md
      - Strategy pattern: developer_guide/strategy_pattern.md
      - Engine: developer_guide/engine.md
      - Code formatting: developer_guide/code_formatting.md
  - API Reference:
      - System: api/system.md
      - NeighborsList: api/neighbors_list.md
      - AtomicEnvironment: api/atomic_environment.md
      - Config: api/config.md
      - Log: api/log.md
      - Algorithms: api/algorithms.md
      - KMC: api/kmc.md
      - Environments: api/environments.md
      - Engine: api/engine.md
      - LammpsEngine: api/lammpsengine.md
      - EventTable: api/event_table.md
      - EventSearch: api/eventsearch.md
      - EventRecycling: api/event_recycling.md
      - Bias: api/bias.md
      - Refinement: api/refinement.md
      - Reconstruction: api/reconstruction.md
      - PointSetRegistration: api/point_set_registration.md
      - Symmetries: api/symmetries.md
      - RateConstant: api/rate_constant.md
      - Basins: api/basins.md
      - ActiveVolume: api/active_volume.md
      - Initializer: api/initializer.md
      - Result: api/result.md
      - Info: api/info_simulation.md
      - Utils: api/utils.md
      - Run: api/run.md

markdown_extensions:
  - pymdownx.arithmatex:
  - mdx_include:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true

extra:
  version:
    provider: mike

plugins:
  - mike:
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            show_source: false
            heading_level: 2
            members_order: alphabetical
            separate_signature: true
            show_docstring_examples: true
            show_root_heading: true
  - search:
  - mkdocs-jupyter:
extra_css:
  - stylesheets/gruvbox.css

use_directory_urls: false
site_url: https://hugomoison.github.io/pyKMC/
